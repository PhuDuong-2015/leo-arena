<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEO FOOTBALL | PLAYER MANAGEMENT SYSTEM</title>
    
    <script src="languages.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --neon: #00f3ff;
            --neon-glow: rgba(0, 243, 255, 0.4);
            --black: #050505;
            --glass: rgba(0, 0, 0, 0.85);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--black);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* NỀN CỐ ĐỊNH */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)), url('background.png');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        /* NÚT CHUYỂN NGÔN NGỮ */
        .lang-switcher {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 999;
            background: rgba(0,0,0,0.7);
            border: 1px solid var(--neon);
            color: var(--neon);
            padding: 8px 12px;
            font-family: 'Orbitron';
            font-size: 12px;
            cursor: pointer;
            transition: 0.3s;
            clip-path: polygon(0 0, 100% 0, 100% 70%, 80% 100%, 0 100%);
        }
        .lang-switcher:hover { background: var(--neon); color: black; box-shadow: 0 0 15px var(--neon); }

        .header-logo {
            padding: 60px 0 20px;
            animation: fadeIn 1s ease;
        }
        .header-logo img {
            width: 110px;
            filter: drop-shadow(0 0 15px var(--neon));
        }

        .login-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px;
        }

        .cyber-card {
            background: var(--glass);
            border: 2px solid var(--neon);
            box-shadow: 0 0 30px var(--neon-glow);
            border-radius: 15px;
            width: 100%;
            max-width: 480px;
            padding: 45px;
            backdrop-filter: blur(15px);
            text-align: center;
        }

        .sys-label {
            font-family: 'Orbitron';
            color: var(--neon);
            font-size: 13px;
            letter-spacing: 2px;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .sys-desc {
            font-size: 13px;
            color: #aaa;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        .form-title {
            font-family: 'Orbitron';
            font-weight: 900;
            font-size: 28px;
            letter-spacing: 3px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .input-group {
            position: relative;
            margin-bottom: 35px;
            text-align: left;
        }

        .input-group input {
            width: 100%;
            padding: 12px 0;
            background: transparent;
            border: none;
            border-bottom: 2px solid #333;
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .input-group label {
            position: absolute;
            left: 0; top: 12px;
            color: #666;
            transition: 0.3s;
            pointer-events: none;
            text-transform: uppercase;
            font-weight: bold;
            font-size: 13px;
        }

        /* Hiệu ứng khi focus hoặc có chữ */
        .input-group input:focus ~ label,
        .input-group input:not(:placeholder-shown) ~ label {
            top: -20px;
            font-size: 11px;
            color: var(--neon);
        }

        .input-group input:focus { border-bottom-color: var(--neon); }

        .btn-kickoff {
            width: 100%;
            padding: 20px;
            background: var(--neon);
            color: black;
            font-family: 'Orbitron';
            font-weight: 900;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            clip-path: polygon(8% 0, 100% 0, 92% 100%, 0% 100%);
            transition: 0.4s;
            margin-top: 10px;
            font-size: 15px;
        }

        .btn-kickoff:hover {
            background: white;
            box-shadow: 0 0 25px var(--neon);
            transform: scale(1.02);
        }

        .footer-text { margin-top: 30px; font-size: 12px; color: #555; }
        .footer-text a { color: var(--neon); text-decoration: none; font-weight: bold; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <button onclick="changeLanguage()" class="lang-switcher" data-i18n="lang_btn">EN</button>

    <div class="header-logo">
        <img src="logo.png" alt="LEO FOOTBALL CLUB">
    </div>

    <div class="login-wrapper">
        <div class="cyber-card">
            <p class="sys-label" data-i18n="sys_label">Hệ thống quản trị cầu thủ</p>
            <p class="sys-desc" data-i18n="sys_desc">Chào mừng trở lại. Đăng nhập để truy cập hồ sơ cầu thủ và lịch thi đấu ARENA.</p>

            <h2 class="form-title">PLAYER <span style="color:var(--neon)">LOGIN</span></h2>

            <form onsubmit="handleLogin(event)">
                <div class="input-group">
                    <input type="text" id="user" required placeholder=" ">
                    <label data-i18n="login_user_label">Tên đăng nhập / Email</label>
                </div>

                <div class="input-group">
                    <input type="password" id="pass" required placeholder=" ">
                    <label data-i18n="login_pass_label">Mật khẩu bảo mật</label>
                </div>

                <button type="submit" class="btn-kickoff" data-i18n="btn_kickoff">Kick off now</button>
            </form>

            <div class="footer-text">
                <span data-i18n="no_account">Chưa có tài khoản?</span> 
                <a href="register.html" data-i18n="reg_now">ĐĂNG KÝ NGAY</a>
            </div>
        </div>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            const user = document.getElementById('user').value;
            // Lấy ngôn ngữ hiện tại để hiện thông báo đúng tiếng
            const lang = localStorage.getItem('lang') || 'vi';
            
            if(user) {
                sessionStorage.setItem('isRegistered', 'true');
                sessionStorage.setItem('playerName', user);
                
                const msg = lang === 'vi' 
                    ? "ĐANG KẾT NỐI HỆ THỐNG ARENA CHO: " 
                    : "CONNECTING TO ARENA SYSTEM FOR: ";
                
                alert(msg + user.toUpperCase());
                window.location.href = 'home.html';
            }
        }
    </script>
</body>
</html>
